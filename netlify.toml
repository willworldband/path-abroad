[build]
  command = "npm install && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[functions]
  timeout = 26

[functions."fetch-opportunities"]
  schedule = "*/30 * * * *"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
